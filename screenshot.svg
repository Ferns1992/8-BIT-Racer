<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640">
  <defs>
    <linearGradient id="g1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7fb0ff"/>
      <stop offset="100%" stop-color="#5C94FC"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#c91448"/>
      <stop offset="50%" stop-color="#E40058"/>
      <stop offset="100%" stop-color="#ff6a8a"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#g1)"/>
  <!-- road -->
  <rect x="120" y="0" width="720" height="640" fill="#505050"/>
  <rect x="90" y="0" width="30" height="640" fill="#2e2e2e"/>
  <rect x="840" y="0" width="30" height="640" fill="#2e2e2e"/>
  <!-- dashed center line -->
  <g fill="#fff" opacity="0.9">
    <rect x="470" y="20" width="20" height="6" rx="3"/>
    <rect x="470" y="80" width="20" height="6" rx="3"/>
    <rect x="470" y="140" width="20" height="6" rx="3"/>
    <rect x="470" y="200" width="20" height="6" rx="3"/>
    <rect x="470" y="260" width="20" height="6" rx="3"/>
    <rect x="470" y="320" width="20" height="6" rx="3"/>
  </g>
  <!-- obstacles -->
  <g>
    <ellipse cx="300" cy="180" rx="28" ry="18" fill="#001"/>
    <ellipse cx="600" cy="260" rx="18" ry="12" fill="#26A026"/>
    <circle cx="420" cy="140" r="14" fill="#F8B800"/>
  </g>
  <!-- car -->
  <g transform="translate(480,500)">
    <ellipse cx="0" cy="28" rx="42" ry="10" fill="rgba(0,0,0,0.45)"/>
    <rect x="-60" y="-30" width="120" height="48" rx="14" ry="14" fill="url(#carGrad)" stroke="#9b0d3a" stroke-width="2"/>
    <rect x="-24" y="-18" width="48" height="20" rx="6" fill="rgba(20,30,40,0.6)"/>
    <rect x="40" y="-26" width="18" height="6" rx="2" fill="#a10033"/>
    <!-- wheels -->
    <g fill="#000" transform="translate(-28,18)"><ellipse rx="10" ry="8"/></g>
    <g fill="#000" transform="translate(28,18)"><ellipse rx="10" ry="8"/></g>
  </g>
  <!-- UI panel -->
  <rect x="20" y="20" width="260" height="88" rx="8" fill="rgba(0,0,0,0.5)"/>
  <text x="36" y="48" fill="#F8B800" font-family="'Press Start 2P', monospace" font-size="14">SCORE</text>
  <text x="36" y="78" fill="#fff" font-family="'Press Start 2P', monospace" font-size="16">000150</text>
</svg>